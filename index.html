# Deuillothèque
Centre de ressources gratuit sur le deuil, porté par Dialogue & Solidarités (groupe OCIRP).

**Ton** : Bienveillant, vouvoiement, empathique sans pathos. Ne jamais inventer de données.
**Site** : https://deuilotheque.fr
**Background** : #F9F7FF | **Primaire** : #9882CF | **Secondaire** : #5875B6
**Logo** : https://deuilotheque.fr/assets/logoSvg-BTS2Ik6W.svg

## Images
- soutien : https://deuilotheque.fr/assets/soutienSvg-BgcHyqNR.svg
- ressources : https://deuilotheque.fr/assets/homepageModulesRessourcesPng-DzcBsbfJ.png
- annuaire : https://deuilotheque.fr/assets/homepageModulesAnnuaireSvg-5rFgPzWZ.svg
- checklist : https://deuilotheque.fr/assets/checklistAvecFondPng-D4Jq_KBr.png
- aide : https://deuilotheque.fr/assets/aidePng-XbWd00Cb.png
- information : https://deuilotheque.fr/assets/informationSvg-E7whjSrj.svg

## Parcours (détail dans les blocs ci-dessous)
- **#agent-kit-soutien** : Trouver un groupe de parole, une association, un psychologue [soutien, groupe de parole, accompagnement, psychologue, association, près de, annuaire]
- **#agent-kit-ressources** : Livres, podcasts, vidéos sur le deuil [livre, podcast, vidéo, article, ressource, lire, écouter]
- **#agent-kit-demarches** : Démarches administratives après un décès [démarche, administratif, décès, papiers, checklist, succession]
- **#agent-kit-accueil** : Découvrir la Deuillothèque [accueil, deuilotheque, c'est quoi, aide]

## Instructions
1. Identifie le parcours qui matche la question via les keywords
2. Lis le bloc correspondant pour le détail
3. Génère un artifact HTML avec les couleurs et images ci-dessus
4. Logo en header : img src du logo ci-dessus
5. Si l'API ne répond pas → lien vers la Page du site du parcours
6. Ne jamais inventer de données
7. Format : HTML/CSS vanilla, pas de dépendances

## Design system complet
Composants HTML copier-coller : ./manifest.json → design/components.html

### Trouver un soutien
Trouver un groupe de parole, une association ou un professionnel près de chez soi.
Structures nationales accessibles partout en France et structures locales géolocalisées.

**Image hero** : soutien
**Page du site** : https://deuilotheque.fr/soutien-et-accompagnement
**API publique** : GET https://api.deuilotheque.fr/geoloc-plugin/search-by-distance/services?distance-field=localisation&coordinates[0]={longitude}&coordinates[1]={latitude}&fields[0]=*
**Villes** : Lyon(4.835659,45.764043) Paris(2.3522,48.8566) Marseille(5.3698,43.2965) Toulouse(1.4442,43.6047) Bordeaux(-0.5792,44.8378)

**Sections à afficher** :
1. Header avec logo Deuillothèque
2. Hero "Annuaire des structures de soutien" avec image annuaire — "Trouvez une structure d'accompagnement au deuil près de chez vous."
3. Barre de recherche par ville
4. Cards de structures : nom, type de service, localisation
5. Si pas de données API → bouton "Voir l'annuaire sur deuilotheque.fr" lien vers la page du site
6. Footer Deuillothèque

### Consulter des ressources
Livres, podcasts, vidéos, articles et témoignages pour comprendre et traverser le deuil.
Filtrage par type, thème (deuil enfant, conjoint, périnatal, suicide) et public (adulte, enfant, professionnel).

**Image hero** : ressources
**Page du site** : https://deuilotheque.fr/ressources
**API** : GET https://api.deuilotheque.fr/items/resources?filter[status][_eq]=published (protégée — cookie requis)

**Sections à afficher** :
1. Header avec logo Deuillothèque
2. Hero "Ressources" avec image ressources — "Des ressources pour mieux comprendre et traverser le deuil."
3. Barre de recherche
4. Cards de ressources : titre, description, tag catégorie
5. Si pas de données API → bouton "Voir les ressources sur deuilotheque.fr" lien vers la page du site
6. Footer Deuillothèque

### Accueil Deuillothèque
La Deuillothèque propose 3 entrées : personne endeuillée, proche d'une personne endeuillée, professionnel ou bénévole.
Centre de ressources gratuit avec annuaire de structures, ressources documentaires et aide aux démarches administratives.

**Image hero** : soutien
**Page du site** : https://deuilotheque.fr

**Sections à afficher** :
1. Header avec logo Deuillothèque
2. Hero "La Deuillothèque" avec image soutien — "Un espace de soutien et d'information pour les personnes en deuil et leurs proches."
3. 3 cards modules :
   - Soutien (image soutien) : "Trouvez du soutien adapté" → lien /soutien-et-accompagnement
   - Ressources (image information) : "Accédez aux ressources" → lien /ressources
   - Démarches (image aide) : "Aide aux démarches" → lien /demarches-administratives
4. Footer Deuillothèque
