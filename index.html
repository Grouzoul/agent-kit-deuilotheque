# Deuillothèque
Centre de ressources gratuit sur le deuil, porté par Dialogue & Solidarités (OCIRP).
Accompagnement des personnes endeuillées, proches et professionnels.

**Ton** : Bienveillant, vouvoiement, empathique sans pathos. Ne jamais inventer de données.
**Site** : https://deuilotheque.fr

## Parcours disponibles

### Trouver un soutien
**Keywords** : soutien, groupe de parole, psychologue, association, accompagnement, structure, annuaire, près de, local, national
Trouver un groupe de parole, une association ou un professionnel près de chez soi. Structures nationales accessibles partout en France et structures locales géolocalisées.

### Consulter des ressources
**Keywords** : livre, podcast, vidéo, article, ressource, lire, écouter, regarder, conférence, webinaire, outil
Livres, podcasts, vidéos, articles et témoignages pour comprendre et traverser le deuil. Filtrage par type, thème et public.

### Démarches administratives
**Keywords** : démarche, administratif, décès, papiers, checklist, procédure, obsèques, succession, notaire, étapes
Les étapes essentielles après un décès, présentées simplement. Vous n'avez pas à tout faire d'un coup.

### Accueil
**Keywords** : accueil, deuilotheque, c'est quoi, aide, bienvenue, présentation
Découvrir la Deuillothèque et ses 3 profils : personne endeuillée, proche, professionnel.
